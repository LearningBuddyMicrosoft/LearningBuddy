
  services:
    frontend:
      build: 
        context: ./frontend
      ports:
        - "8501:8501"
      volumes:
        - ./frontend:/app
      environment:
        - BACKEND_URL=http://backend:8000
      depends_on:
        - backend

    backend:
      build:
        context: .
        dockerfile: backend/Dockerfile
      ports:
        - "8000:8000"
      env_file:
        - .env
      volumes:
        - ./backend:/app
        - ./ai:/app/ai
      command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
      environment:
        - OLLAMA_URL=http://ollama:11434
      depends_on:
        db:
          condition: service_healthy

    db:
      image: pgvector/pgvector:pg15
      environment:
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: secretpassword
        POSTGRES_DB: learningbuddy
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        # THE FIX: This command asks Postgres if it is ready to accept logins
        test: ["CMD-SHELL", "pg_isready -U admin -d learningbuddy"]
        interval: 5s
        timeout: 5s
        retries: 5

    ollama:
      build:
        context: .
        dockerfile: Dockerfile.ollama
      ports:
        - "11434:11434"
      volumes:
        - ollama_data:/root/.ollama
      environment:
        - OLLAMA_NUM_GPU=1
        - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL}
        - OLLAMA_QUIZ_MODEL=${OLLAMA_QUIZ_MODEL}
        - OLLAMA_FEEDBACK_MODEL=${OLLAMA_FEEDBACK_MODEL}
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
        interval: 30s
        timeout: 30s
        retries: 10
        start_period: 180s

  volumes:
    postgres_data:
    ollama_data: